name: DevOps Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest

      - name: Build Docker
        run: docker build -t myapp:latest .

      - name: Docker Run
        run: docker run myapp:latest

      - name: Docker Deploy
        run: docker run myapp:latest